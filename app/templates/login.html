{% extends 'base_login.html' %} 
{% load static%}

{% block content %}
<div class="login-card">
    <div class="login-header">
        <h2>Bienvenido</h2>
        <p>Ingrese sus credenciales para continuar</p>
    </div>

    {% if state == 2 %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fa fa-exclamation-triangle" style="margin-right: 8px;"></i>
        {{ message }}
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    {% endif %}

    <form action="/login/" method="post">  
        {% csrf_token %}
        <div class="form-group">
            <input type="text" class="form-control" name="username" id="username" placeholder="Usuario / ID de Contador" required>
        </div>
        <div class="form-group">
            <input name="password" id="password" type="password" class="form-control" placeholder="Contraseña" required>
        </div>
        <div class="form-group">
            <button type="submit" class="btn-login">
                <i class="fa fa-sign-in"></i>
                Iniciar Sesión
            </button>
        </div>
    </form>
    
    <div class="footer-note">
        <i class="fa fa-shield-alt"></i> Aleman Guerra Contadores
    </div>
</div>
{% endblock %}
