{% load static%}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aleman Guerra Contadores - Login</title>
  
  <!-- FAVICON -->
  <link href="{% static 'img/favicon.png'%}" rel="shortcut icon">
  <!-- Bootstrap -->
  <link rel="stylesheet" href="{% static 'plugins/bootstrap/css/bootstrap.min.css'%}">
  <!-- Font Awesome -->
  <link href="{% static 'plugins/font-awesome/css/font-awesome.min.css' %}" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
      :root {
          --navy-dark: #0A1628;
          --navy-medium: #1B2B4E;
          --navy-light: #243B67;
          --gold-primary: #C5A028;
          --gold-light: #F4B41A;
          --gold-dark: #9E7E1F;
      }

      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      body {
          background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy-medium) 50%, var(--navy-light) 100%);
          min-height: 100vh;
          font-family: 'Roboto', sans-serif;
          position: relative;
      }

      /* Overlay pattern */
      body::before {
          content: '';
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="rgba(255,255,255,0.03)" d="M10,10 L20,10 L20,20 L10,20 Z M30,30 L40,30 L40,40 L30,40 Z M50,50 L60,50 L60,60 L50,60 Z M70,70 L80,70 L80,80 L70,80 Z"/></svg>');
          background-repeat: repeat;
          pointer-events: none;
      }

      .login-container {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
          position: relative;
          z-index: 1;
      }

      .login-card {
          background: white;
          border-radius: 24px;
          box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
          padding: 48px 40px;
          transition: transform 0.3s ease;
          max-width: 440px;
          width: 100%;
      }

      .login-card:hover {
          transform: translateY(-5px);
      }

      .login-header {
          text-align: center;
          margin-bottom: 32px;
      }

      .login-header h2 {
          color: var(--navy-dark);
          font-weight: 700;
          font-size: 28px;
          margin-bottom: 8px;
      }

      .login-header p {
          color: #64748b;
          font-size: 14px;
      }

      .form-group {
          margin-bottom: 24px;
      }

      .form-control {
          width: 100%;
          padding: 12px 16px;
          border: 2px solid #e2e8f0;
          border-radius: 12px;
          font-size: 15px;
          transition: all 0.3s;
      }

      .form-control:focus {
          border-color: var(--gold-primary);
          box-shadow: 0 0 0 3px rgba(197, 160, 40, 0.1);
          outline: none;
      }

      .btn-login {
          width: 100%;
          padding: 14px;
          background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-light) 100%);
          color: var(--navy-dark);
          border: none;
          border-radius: 12px;
          font-size: 16px;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
      }

      .btn-login:hover {
          transform: translateY(-2px);
          box-shadow: 0 10px 20px -5px rgba(197, 160, 40, 0.4);
      }

      .alert {
          padding: 12px 16px;
          border-radius: 12px;
          margin-bottom: 20px;
          font-size: 14px;
          border-left: 4px solid;
      }

      .alert-danger {
          background: #fee2e2;
          color: #dc2626;
          border-left-color: #dc2626;
      }

      .close {
          background: none;
          border: none;
          font-size: 20px;
          cursor: pointer;
          color: #991b1b;
          float: right;
      }

      .footer-note {
          text-align: center;
          margin-top: 24px;
          font-size: 11px;
          color: #94a3b8;
      }

      .footer-note i {
          color: var(--gold-light);
      }
  </style>
</head>
<body>
    <div class="login-container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="{% static 'plugins/jQuery/jquery.min.js'%}"></script>
    <script src="{% static 'plugins/bootstrap/js/bootstrap.min.js'%}"></script>
</body>
</html>
